services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_calendar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_calendar}
      POSTGRES_DB: ${POSTGRES_DB:-ai_calendar}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_calendar}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ai_calendar}:${POSTGRES_PASSWORD:-ai_calendar}@postgres:5432/${POSTGRES_DB:-ai_calendar}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BIND_HOST:-127.0.0.1}:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ai_calendar}:${POSTGRES_PASSWORD:-ai_calendar}@postgres:5432/${POSTGRES_DB:-ai_calendar}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
    command: uv run arq app.workers.tasks.WorkerSettings

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_DEV_USER_EMAIL: ${NEXT_PUBLIC_DEV_USER_EMAIL:-demo@example.com}
    ports:
      - "${BIND_HOST:-127.0.0.1}:3000:3000"
    depends_on:
      - backend
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  tg-bot:
    build:
      context: ./apps/tg-bot
      dockerfile: Dockerfile
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
      PUSH_LISTEN_HOST: 0.0.0.0
      PUSH_LISTEN_PORT: 8001
    depends_on:
      - backend
    restart: unless-stopped
    # Push receiver is reachable as http://tg-bot:8001 from the backend
    # container; not exposed to the host by default. Add a port mapping
    # below if you want to test /push from the host.
    # ports:
    #   - "${BIND_HOST:-127.0.0.1}:8001:8001"
    profiles:
      - telegram

volumes:
  postgres-data:
  redis-data:
